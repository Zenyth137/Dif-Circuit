# MDP Training Configuration
# Overrides from default.yaml

# Match environment.max_modules — GNN runs on this many modules, not 5000.
netlist:
  num_modules: 200
  num_nets: 800

environment:
  grid_size: 64
  max_modules: 200
  w_hpwl: 1.0
  w_congestion: 0.5
  w_overlap: 500.0  # heavy overlap penalty (was 0.05 — way too low)

policy:
  grid_size: 64
  hidden_dim: 128
  gnn_layers: 3
  gnn_heads: 4

ppo:
  lr: 0.0003
  gamma: 0.99
  lam: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  epochs: 10
  batch_size: 64

# Intrinsic Curiosity Module (ICM) for exploration
curiosity:
  curiosity_eta: 0.5          # intrinsic reward weight (0 = disable ICM)
  curiosity_lr: 0.0001         # ICM learning rate
  curiosity_hidden: 256        # ICM hidden dim
  curiosity_forward_weight: 1.0
  curiosity_inverse_weight: 0.2

num_iterations: 2000
episodes_per_iter: 16
early_stop_patience: 100
