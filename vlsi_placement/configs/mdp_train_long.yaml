# Longer MDP training with stronger overlap penalty (re-train after metric/reward fixes)

netlist:
  num_modules: 200
  num_nets: 800

environment:
  grid_size: 64
  max_modules: 200
  w_hpwl: 1.0
  w_congestion: 0.5
  w_overlap: 500.0

policy:
  grid_size: 64
  hidden_dim: 128
  gnn_layers: 3
  gnn_heads: 4

ppo:
  lr: 0.0003
  gamma: 0.99
  lam: 0.95
  clip_eps: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  epochs: 10
  batch_size: 64

num_iterations: 2000
episodes_per_iter: 16
early_stop_patience: 100

# Intrinsic Curiosity Module (ICM) for exploration
curiosity:
  curiosity_eta: 0.5
  curiosity_lr: 0.0001
  curiosity_hidden: 256
  curiosity_forward_weight: 1.0
  curiosity_inverse_weight: 0.2
